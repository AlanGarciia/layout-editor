# LayersWork - stack para Portainer
# Usa nginx-proxy (reverse_proxy): los contenedores se exponen mediante
# las variables VIRTUAL_HOST / VIRTUAL_PORT / LETSENCRYPT_HOST, que el proxy
# y su companion de SSL detectan automaticamente.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: layerswork-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - VIRTUAL_HOST=api.layerswork.com
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=api.layerswork.com
      - LETSENCRYPT_EMAIL=tu@email.com
    volumes:
      - layerswork_storage:/app/storage_data
    networks:
      - proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: "https://api.layerswork.com"
        NEXT_PUBLIC_SITE_URL: "https://layerswork.com"
    container_name: layerswork-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - VIRTUAL_HOST=layerswork.com,www.layerswork.com
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=layerswork.com,www.layerswork.com
      - LETSENCRYPT_EMAIL=tu@email.com
    depends_on:
      - backend
    networks:
      - proxy

volumes:
  layerswork_storage:

networks:
  proxy:
    external: true
    name: prova_competencial_network